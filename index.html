<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黎沫品牌知识库</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0f0f0e;
  font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;
  color:#e8e4dc;
  min-height:100vh;
  padding:0 0 60px;
}

/* 顶部 */
.top{padding:52px 22px 32px;border-bottom:1px solid rgba(201,168,76,.16)}
.eyebrow{font-size:11px;letter-spacing:.22em;color:#c9a84c;text-transform:uppercase;margin-bottom:12px}
.top h1{font-size:26px;font-weight:700;color:#f5f2ec;line-height:1.3;margin-bottom:6px}
.top h1 em{color:#c9a84c;font-style:normal}
.top-sub{font-size:13px;color:#72706c;margin-bottom:20px}
.gold-rule{width:32px;height:2px;background:#c9a84c}

/* 列表 */
.list{padding:28px 18px;display:flex;flex-direction:column;gap:12px}
.sec-label{font-size:11px;letter-spacing:.18em;color:#72706c;text-transform:uppercase;margin-bottom:4px;padding:0 2px}

.card{
  display:flex;align-items:center;gap:14px;
  background:#1a1917;border:1px solid #242220;
  border-radius:14px;padding:18px 16px;
  text-decoration:none;color:inherit;
  transition:background .15s,border-color .15s;
  position:relative;overflow:hidden;
}
.card:active{background:#242220}
.card::after{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:#c9a84c;border-radius:3px 0 0 3px;
  opacity:0;transition:opacity .15s;
}
.card:active::after{opacity:1}

.card-icon{
  width:42px;height:42px;border-radius:50%;
  background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.card-text{flex:1}
.card-name{font-size:15px;font-weight:600;color:#f5f2ec;margin-bottom:3px}
.card-sub{font-size:12px;color:#72706c;line-height:1.5}
.card-arrow{color:#c9a84c;font-size:16px;flex-shrink:0;opacity:.6}

/* 占位卡 */
.card-soon{opacity:.45;cursor:default}
.card-soon .card-arrow{display:none}
.soon-badge{font-size:10px;color:#72706c;border:1px solid #333;border-radius:4px;padding:2px 7px;white-space:nowrap}

/* 底部 */
footer{padding:24px 22px;text-align:center;border-top:1px solid rgba(201,168,76,.1)}
.footer-brand{font-size:13px;color:#c9a84c;letter-spacing:.18em;margin-bottom:4px}
.footer-note{font-size:11px;color:#3a3835}
</style>
</head>
<body>

<div class="top">
  <div class="eyebrow">内部资料 · 请勿外传</div>
  <h1>LYMO黎沫<br><em>品牌知识库</em></h1>
  <div class="top-sub">主播培训手册 · 产品话术 · 销售场景</div>
  <div class="gold-rule"></div>
</div>

<div class="list">
  <div class="sec-label">护肤 · 面部</div>

  <a href="lymo_mask_handbook_final.html" class="card">
    <div class="card-icon">🌸</div>
    <div class="card-text">
      <div class="card-name">牡丹焕亮面膜</div>
      <div class="card-sub">补水修护 · 敏感急救 · 妆前打底</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <a href="lymo_serum_handbook.html" class="card">
    <div class="card-icon">✦</div>
    <div class="card-text">
      <div class="card-name">三抗焕颜精华</div>
      <div class="card-sub">抗氧 · 抗糖 · 抗污染</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <div class="sec-label" style="margin-top:8px">即将上线</div>

  <div class="card card-soon">
    <div class="card-icon">💧</div>
    <div class="card-text">
      <div class="card-name">沁透焕肤精粹水</div>
      <div class="card-sub">手册准备中</div>
    </div>
    <div class="soon-badge">即将上线</div>
  </div>

  <div class="card card-soon">
    <div class="card-icon">🫧</div>
    <div class="card-text">
      <div class="card-name">凝时润肤精华乳</div>
      <div class="card-sub">手册准备中</div>
    </div>
    <div class="soon-badge">即将上线</div>
  </div>

</div>

<footer>
  <div class="footer-brand">LYMO 黎沫</div>
  <div class="footer-note">内部培训资料 · 请勿外传</div>
</footer>

</body>
</html>
